    justify-content: center;

    animation: chatPulse 3s infinite;
}
.chatbot-toggle.active { animation: none; }

    0%, 100% { box-shadow: 0 4px 24px rgba(99,102,241,.5), 0 0 0 0 rgba(99,102,241,.4); }

        'CODE HELP RULES:',
        '- When writing code, always use markdown code blocks with the language specified (```python, ```java, etc.).',
        '- When debugging, first explain WHAT the bug is, then WHY it happens, then show the fix.',
        '- When asked to "just give me the answer", gently nudge them to think through it, then provide the solution with explanation.',
        '- Provide runnable, complete code examples when possible.',
        '',
        'QUIZ & STUDY FEATURES:',
        '- When asked to quiz, generate 3-5 multiple choice or short answer questions, wait for the answer, then grade it.',
        '- When creating study plans, organize by topic with estimated time per section.',
        '- Use markdown formatting: headers (##), bold (**), bullet points, numbered lists, and code blocks.',
        '',
        'PERSONALITY:',
        '- Be friendly, warm, and approachable — like a cool older student who genuinely wants to help.',
        '- Use occasional emojis where natural (not excessive).',
        '- Keep responses well-structured with headers and lists for readability.',
        '- For short questions, give concise answers. For complex topics, be thorough.',
        '- If you don\'t know something, say so honestly rather than making things up.'
    ].join('\n');

    // ── Toggle ───────────────────────────────────────────────
    window.chatbotToggle = function() {
        isOpen = !isOpen;
        document.getElementById('chatbotWindow').classList.toggle('open', isOpen);
        document.getElementById('chatbotToggle').classList.toggle('active', isOpen);
        if (isOpen) document.getElementById('chatbotInput').focus();
    };

    // ── Clear ────────────────────────────────────────────────
    window.chatbotClear = function() {
        chatHistory = [];
        var msgs = document.getElementById('chatbotMessages');
        msgs.innerHTML = '';
        msgs.innerHTML =
            '<div class="chatbot-welcome" id="chatbotWelcome">' +
            '  <div class="chatbot-welcome-icon">🧠</div>' +
            '  <h3>Hi! I\'m Nighthawk AI Tutor</h3>' +
            '  <p>Your personal coding & learning assistant. I can help with code, explain concepts, quiz you, and more!</p>' +
            '  <div class="chatbot-welcome-features">' +
            '    <span class="chatbot-feature-tag">💻 Code Help</span>' +
            '    <span class="chatbot-feature-tag">📝 Quizzes</span>' +
            '    <span class="chatbot-feature-tag">📖 Explanations</span>' +
            '    <span class="chatbot-feature-tag">🐛 Debug</span>' +
            '    <span class="chatbot-feature-tag">📋 Study Plans</span>' +
            '  </div>' +
            '  <div class="chatbot-suggestions">' +
            '    <button class="chatbot-suggestion" onclick="chatbotSuggest(\'Explain how Python dictionaries work with examples\')">' +
            '      <span class="chatbot-suggestion-icon">🐍</span>' +
            '      <span class="chatbot-suggestion-text"><span class="chatbot-suggestion-title">Explain Python Dictionaries</span><span class="chatbot-suggestion-desc">Learn with clear examples</span></span>' +
            '    </button>' +
            '    <button class="chatbot-suggestion" onclick="chatbotSuggest(\'Quiz me on JavaScript fundamentals\')">' +
            '      <span class="chatbot-suggestion-icon">📝</span>' +
            '      <span class="chatbot-suggestion-text"><span class="chatbot-suggestion-title">Quiz Me on JavaScript</span><span class="chatbot-suggestion-desc">Test your knowledge</span></span>' +
            '    </button>' +
            '    <button class="chatbot-suggestion" onclick="chatbotSuggest(\'Help me debug my code - it gives an error\')">' +
            '      <span class="chatbot-suggestion-icon">🐛</span>' +
            '      <span class="chatbot-suggestion-text"><span class="chatbot-suggestion-title">Debug My Code</span><span class="chatbot-suggestion-desc">Paste your code and error message</span></span>' +
            '    </button>' +
            '    <button class="chatbot-suggestion" onclick="chatbotSuggest(\'What can you help me with?\')">' +
            '      <span class="chatbot-suggestion-icon">✨</span>' +

            '</div>';
    };

    // ── Suggestions ──────────────────────────────────────────
    window.chatbotSuggest = function(text) {
        document.getElementById('chatbotInput').value = text;
        chatbotSendMessage();
    };

    // ── Send ─────────────────────────────────────────────────
    window.chatbotSendMessage = function() {
        if (isSending) return;
        var input = document.getElementById('chatbotInput');
        var text = input.value.trim();
        if (!text) return;

        // Hide welcome
        var welcome = document.getElementById('chatbotWelcome');
        if (welcome) welcome.remove();

        appendMessage('user', text);
        chatHistory.push({ role: 'user', content: text });
        input.value = '';
        autoResizeInput();

        isSending = true;
        document.getElementById('chatbotTyping').classList.add('active');
        document.getElementById('chatbotSend').disabled = true;
        scrollToBottom();

        callAI(text)
            .then(function(reply) {
                document.getElementById('chatbotTyping').classList.remove('active');
                appendMessage('bot', reply);
                chatHistory.push({ role: 'assistant', content: reply });
            })
            .catch(function(err) {
                document.getElementById('chatbotTyping').classList.remove('active');
                appendMessage('bot', '⚠️ **Connection issue** — I couldn\'t reach the AI service. Please check that an API key (`GROQ_API_KEY` or `GEMINI_API_KEY`) is configured in your `.env` file, then try again.');
            })
            .finally(function() {
                isSending = false;
                document.getElementById('chatbotSend').disabled = false;
                scrollToBottom();
            });
    };

    function scrollToBottom() {
        var msgs = document.getElementById('chatbotMessages');
        setTimeout(function() { msgs.scrollTop = msgs.scrollHeight; }, 50);
    }

    // ── AI Call with Groq → Gemini fallback ──────────────────
    function callAI(userMessage) {
        var messages = [{ role: 'system', content: SYSTEM_PROMPT }];
        var recent = chatHistory.slice(-24);
        for (var i = 0; i < recent.length; i++) {
            messages.push({ role: recent[i].role, content: recent[i].content });
        }
        messages.push({ role: 'user', content: userMessage });

        // Try Groq first
        return fetch('/api/groq/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                messages: messages,
                model: 'llama-3.3-70b-versatile',
                temperature: 0.7,
                max_tokens: 2048
            })
        })
        .then(function(resp) {
            if (!resp.ok) throw new Error('Groq failed');
            return resp.json();
        })
        .then(function(data) {
            if (data.success && data.response) return data.response;
            if (data.choices && data.choices[0]) return data.choices[0].message.content;
            throw new Error('No Groq response');
        })
        .catch(function() {
            // Fallback to Gemini
            var prompt = SYSTEM_PROMPT + '\n\nConversation so far:\n';
            var recent = chatHistory.slice(-12);
            for (var i = 0; i < recent.length; i++) {
                prompt += (recent[i].role === 'user' ? 'Student' : 'Tutor') + ': ' + recent[i].content + '\n';
            }
            prompt += 'Student: ' + userMessage + '\n\nTutor:';

            return fetch('/api/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ text: prompt })
            })
            .then(function(resp) {
                if (!resp.ok) throw new Error('Gemini failed');
                return resp.json();
            })
            .then(function(data) {
                if (data.response) return data.response;
                if (data.analysis) return data.analysis;
                throw new Error('No Gemini response');
            });
        });
    }

    // ── Append Message ───────────────────────────────────────
    function appendMessage(role, text) {
        var msgs = document.getElementById('chatbotMessages');
        var div = document.createElement('div');
        div.className = 'chatbot-msg ' + role;

        var avatar = document.createElement('div');
        avatar.className = 'chatbot-msg-avatar';
        avatar.textContent = role === 'bot' ? '🧠' : '👤';

        var content = document.createElement('div');
        content.className = 'chatbot-msg-content';

        var bubble = document.createElement('div');
        bubble.className = 'chatbot-msg-bubble';
        bubble.innerHTML = formatMarkdown(text);

        var time = document.createElement('div');
        time.className = 'chatbot-msg-time';
        var now = new Date();
        time.textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

        content.appendChild(bubble);
        content.appendChild(time);
        div.appendChild(avatar);
        div.appendChild(content);
        msgs.appendChild(div);

        // Attach copy handlers to any code blocks just added
        bubble.querySelectorAll('.chatbot-code-copy').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var code = btn.closest('.chatbot-code-block').querySelector('pre').textContent;
                navigator.clipboard.writeText(code).then(function() {
                    btn.innerHTML = '✓ Copied';
                    btn.classList.add('copied');
                    setTimeout(function() {
                        btn.innerHTML = '📋 Copy';
                        btn.classList.remove('copied');
                    }, 2000);
                });
            });
        });

        scrollToBottom();
    }

    // ── Markdown Formatter ───────────────────────────────────
    function formatMarkdown(text) {
        // Escape HTML first
        text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

        // Code blocks with language + copy button
        text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(match, lang, code) {
            var langLabel = lang || 'code';
            var cleanCode = code.replace(/^\n+|\n+$/g, '');
            return '<div class="chatbot-code-block">' +
                '<div class="chatbot-code-header">' +
                '<span class="chatbot-code-lang">' + langLabel + '</span>' +
                '<button class="chatbot-code-copy" type="button">📋 Copy</button>' +
                '</div>' +
                '<pre><code>' + cleanCode + '</code></pre>' +
                '</div>';
        });

        // Inline code
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

        // Headers
        text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');

        // Blockquotes
        text = text.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

        // Horizontal rules
        text = text.replace(/^---$/gm, '<hr>');

        // Bold and italic
        text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
        text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');

        // Unordered lists
        text = text.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
        text = text.replace(/(<li>.*<\/li>\n?)+/g, function(match) {
            return '<ul>' + match + '</ul>';
        });

        // Ordered lists
        text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

        // Links
        text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

        // Tables (simple)
        text = text.replace(/^(\|.+\|)\n(\|[\-\s|:]+\|)\n((?:\|.+\|\n?)+)/gm, function(match, header, sep, body) {
            var headerCells = header.split('|').filter(function(c) { return c.trim(); });
            var rows = body.trim().split('\n');
            var table = '<table><thead><tr>';
            headerCells.forEach(function(c) { table += '<th>' + c.trim() + '</th>'; });
            table += '</tr></thead><tbody>';
            rows.forEach(function(row) {
                var cells = row.split('|').filter(function(c) { return c.trim(); });
                table += '<tr>';
                cells.forEach(function(c) { table += '<td>' + c.trim() + '</td>'; });
                table += '</tr>';
            });
            table += '</tbody></table>';
            return table;
        });

        // Paragraphs
        text = text.replace(/\n\n/g, '</p><p>');
        text = text.replace(/\n/g, '<br>');
        text = '<p>' + text + '</p>';

        // Clean up empty paragraphs and fix nesting
        text = text.replace(/<p><\/p>/g, '');
        text = text.replace(/<p>(<h[123]>)/g, '$1');
        text = text.replace(/(<\/h[123]>)<\/p>/g, '$1');
        text = text.replace(/<p>(<ul>)/g, '$1');
        text = text.replace(/(<\/ul>)<\/p>/g, '$1');
        text = text.replace(/<p>(<div class="chatbot-code-block">)/g, '$1');
        text = text.replace(/(<\/div>)<\/p>/g, '$1');
        text = text.replace(/<p>(<table>)/g, '$1');
        text = text.replace(/(<\/table>)<\/p>/g, '$1');
        text = text.replace(/<p>(<blockquote>)/g, '$1');
        text = text.replace(/(<\/blockquote>)<\/p>/g, '$1');
        text = text.replace(/<p><hr><\/p>/g, '<hr>');
        text = text.replace(/<p><br>/g, '<p>');

        return text;
    }

    // ── Auto-resize textarea ─────────────────────────────────
    function autoResizeInput() {
        var input = document.getElementById('chatbotInput');
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    }

    // ── Event Listeners ──────────────────────────────────────
    var chatInput = document.getElementById('chatbotInput');
    chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            chatbotSendMessage();
        }
    });
    chatInput.addEventListener('input', autoResizeInput);
})();
</script>
