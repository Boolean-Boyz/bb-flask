<!-- AI Chatbot Widget - Floating bottom-right on every page -->
<style>
/* ── Chatbot Toggle Button ─────────────────────────────────── */
.chatbot-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10000;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.45);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
}
.chatbot-toggle:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(99, 102, 241, 0.6);
}
.chatbot-toggle svg { width: 26px; height: 26px; fill: #fff; }
.chatbot-toggle .close-icon { display: none; }
.chatbot-toggle.active .chat-icon  { display: none; }
.chatbot-toggle.active .close-icon { display: block; }

/* ── Chat Window ───────────────────────────────────────────── */
.chatbot-window {
    position: fixed;
    bottom: 92px;
    right: 24px;
    z-index: 10000;
    width: 400px;
    max-height: 560px;
    background: #111827;
    border-radius: 16px;
    border: 1px solid rgba(99, 102, 241, .25);
    box-shadow: 0 12px 48px rgba(0, 0, 0, .55);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transform: translateY(16px) scale(.96);
    transition: opacity .25s, transform .25s;
}
.chatbot-window.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0) scale(1);
}

/* ── Header ────────────────────────────────────────────────── */
.chatbot-header {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: #fff;
    flex-shrink: 0;
}
.chatbot-header-avatar {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,.18);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}
.chatbot-header-info { flex: 1; }
.chatbot-header-info h4 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
}
.chatbot-header-info span {
    font-size: 12px;
    opacity: .8;
    display: flex;
    align-items: center;
    gap: 5px;
}
.chatbot-online-dot {
    width: 7px; height: 7px;
    background: #34d399;
    border-radius: 50%;
    display: inline-block;
}
.chatbot-header-actions {
    display: flex;
    gap: 6px;
}
.chatbot-header-btn {
    background: rgba(255,255,255,.15);
    border: none;
    color: #fff;
    width: 30px; height: 30px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: background .15s;
}
.chatbot-header-btn:hover { background: rgba(255,255,255,.25); }

/* ── Messages Area ─────────────────────────────────────────── */
.chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
    max-height: 350px;
}
.chatbot-messages::-webkit-scrollbar { width: 5px; }
.chatbot-messages::-webkit-scrollbar-track { background: transparent; }
.chatbot-messages::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }

/* ── Message Bubbles ───────────────────────────────────────── */
.chatbot-msg {
    display: flex;
    gap: 8px;
    animation: chatFadeIn .3s ease-out;
}
@keyframes chatFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}
.chatbot-msg.user { flex-direction: row-reverse; }

.chatbot-msg-avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
}
.chatbot-msg.bot .chatbot-msg-avatar {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
}
.chatbot-msg.user .chatbot-msg-avatar {
    background: #374151;
}

.chatbot-msg-bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
    word-wrap: break-word;
}
.chatbot-msg.bot .chatbot-msg-bubble {
    background: #1f2937;
    color: #e5e7eb;
    border-bottom-left-radius: 4px;
}
.chatbot-msg.user .chatbot-msg-bubble {
    background: #6366f1;
    color: #fff;
    border-bottom-right-radius: 4px;
}
.chatbot-msg-bubble p { margin: 0 0 6px; }
.chatbot-msg-bubble p:last-child { margin-bottom: 0; }
.chatbot-msg-bubble ul, .chatbot-msg-bubble ol { margin: 4px 0; padding-left: 18px; }
.chatbot-msg-bubble code {
    background: rgba(99,102,241,.15);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12.5px;
}
.chatbot-msg-bubble strong { color: #a5b4fc; }

/* ── Typing Indicator ──────────────────────────────────────── */
.chatbot-typing {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
}
.chatbot-typing.active { display: flex; }
.chatbot-typing-dots {
    display: flex;
    gap: 4px;
    padding: 8px 14px;
    background: #1f2937;
    border-radius: 12px;
}
.chatbot-typing-dot {
    width: 7px; height: 7px;
    background: #6366f1;
    border-radius: 50%;
    animation: chatBounce 1.4s infinite;
}
.chatbot-typing-dot:nth-child(2) { animation-delay: .15s; }
.chatbot-typing-dot:nth-child(3) { animation-delay: .3s; }
@keyframes chatBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: .5; }
    30%           { transform: translateY(-6px); opacity: 1; }
}

/* ── Welcome Screen ────────────────────────────────────────── */
.chatbot-welcome {
    text-align: center;
    padding: 28px 16px 12px;
}
.chatbot-welcome-icon {
    width: 52px; height: 52px;
    margin: 0 auto 14px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
}
.chatbot-welcome h3 {
    color: #f3f4f6;
    font-size: 16px;
    margin: 0 0 6px;
}
.chatbot-welcome p {
    color: #9ca3af;
    font-size: 13px;
    line-height: 1.5;
    margin: 0;
}
.chatbot-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
}
.chatbot-suggestion {
    background: #1f2937;
    border: 1px solid #374151;
    color: #a5b4fc;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12.5px;
    cursor: pointer;
    transition: all .15s;
}
.chatbot-suggestion:hover {
    background: #374151;
    border-color: #6366f1;
    color: #c7d2fe;
}

/* ── Input Area ────────────────────────────────────────────── */
.chatbot-input-area {
    padding: 12px 16px;
    background: #0f172a;
    border-top: 1px solid rgba(99, 102, 241, .15);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
}
.chatbot-input {
    flex: 1;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 22px;
    padding: 10px 16px;
    color: #f1f5f9;
    font-size: 13.5px;
    outline: none;
    transition: border-color .2s;
}
.chatbot-input:focus { border-color: #6366f1; }
.chatbot-input::placeholder { color: #64748b; }

.chatbot-send {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: #6366f1;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, transform .15s;
    flex-shrink: 0;
}
.chatbot-send:hover:not(:disabled) {
    background: #8b5cf6;
    transform: scale(1.05);
}
.chatbot-send:disabled { opacity: .4; cursor: not-allowed; }
.chatbot-send svg { width: 18px; height: 18px; fill: #fff; }

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 480px) {
    .chatbot-window {
        width: calc(100vw - 32px);
        right: 16px;
        bottom: 84px;
        max-height: calc(100vh - 120px);
    }
    .chatbot-toggle { bottom: 16px; right: 16px; }
}
</style>

<!-- Toggle Button -->
<button class="chatbot-toggle" id="chatbotToggle" onclick="chatbotToggle()" title="Chat with AI Assistant">
    <svg class="chat-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
    <svg class="close-icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
</button>

<!-- Chat Window -->
<div class="chatbot-window" id="chatbotWindow">
    <!-- Header -->
    <div class="chatbot-header">
        <div class="chatbot-header-avatar">🤖</div>
        <div class="chatbot-header-info">
            <h4>AI Assistant</h4>
            <span><span class="chatbot-online-dot"></span> Online &middot; Powered by AI</span>
        </div>
        <div class="chatbot-header-actions">
            <button class="chatbot-header-btn" onclick="chatbotClear()" title="Clear chat">🗑</button>
        </div>
    </div>

    <!-- Messages -->
    <div class="chatbot-messages" id="chatbotMessages">
        <div class="chatbot-welcome" id="chatbotWelcome">
            <div class="chatbot-welcome-icon">✨</div>
            <h3>Hey there! I'm your AI Assistant</h3>
            <p>Ask me anything — homework help, coding questions, or just a friendly chat!</p>
            <div class="chatbot-suggestions">
                <button class="chatbot-suggestion" onclick="chatbotSuggest('Help me study for my exam')">📚 Study help</button>
                <button class="chatbot-suggestion" onclick="chatbotSuggest('Explain Python lists')">🐍 Python help</button>
                <button class="chatbot-suggestion" onclick="chatbotSuggest('Give me a fun fact')">🎲 Fun fact</button>
            </div>
        </div>
    </div>

    <!-- Typing indicator -->
    <div class="chatbot-typing" id="chatbotTyping">
        <div class="chatbot-msg-avatar" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;">🤖</div>
        <div class="chatbot-typing-dots">
            <div class="chatbot-typing-dot"></div>
            <div class="chatbot-typing-dot"></div>
            <div class="chatbot-typing-dot"></div>
        </div>
    </div>

    <!-- Input -->
    <div class="chatbot-input-area">
        <input class="chatbot-input" id="chatbotInput" type="text" placeholder="Type a message..." autocomplete="off">
        <button class="chatbot-send" id="chatbotSend" onclick="chatbotSendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
(function() {
    // ── State ────────────────────────────────────────────────
    var chatHistory = [];
    var isOpen = false;
    var isSending = false;

    // ── Toggle ───────────────────────────────────────────────
    window.chatbotToggle = function() {
        isOpen = !isOpen;
        document.getElementById('chatbotWindow').classList.toggle('open', isOpen);
        document.getElementById('chatbotToggle').classList.toggle('active', isOpen);
        if (isOpen) document.getElementById('chatbotInput').focus();
    };

    // ── Clear ────────────────────────────────────────────────
    window.chatbotClear = function() {
        chatHistory = [];
        var msgs = document.getElementById('chatbotMessages');
        msgs.innerHTML = '';
        // Re-add welcome
        msgs.innerHTML =
            '<div class="chatbot-welcome" id="chatbotWelcome">' +
            '  <div class="chatbot-welcome-icon">✨</div>' +
            '  <h3>Hey there! I\'m your AI Assistant</h3>' +
            '  <p>Ask me anything — homework help, coding questions, or just a friendly chat!</p>' +
            '  <div class="chatbot-suggestions">' +
            '    <button class="chatbot-suggestion" onclick="chatbotSuggest(\'Help me study for my exam\')">📚 Study help</button>' +
            '    <button class="chatbot-suggestion" onclick="chatbotSuggest(\'Explain Python lists\')">🐍 Python help</button>' +
            '    <button class="chatbot-suggestion" onclick="chatbotSuggest(\'Give me a fun fact\')">🎲 Fun fact</button>' +
            '  </div>' +
            '</div>';
    };

    // ── Suggestions ──────────────────────────────────────────
    window.chatbotSuggest = function(text) {
        document.getElementById('chatbotInput').value = text;
        chatbotSendMessage();
    };

    // ── Send ─────────────────────────────────────────────────
    window.chatbotSendMessage = function() {
        if (isSending) return;
        var input = document.getElementById('chatbotInput');
        var text = input.value.trim();
        if (!text) return;

        // Hide welcome
        var welcome = document.getElementById('chatbotWelcome');
        if (welcome) welcome.remove();

        // Show user message
        appendMessage('user', text);
        chatHistory.push({ role: 'user', content: text });
        input.value = '';

        // Show typing
        isSending = true;
        document.getElementById('chatbotTyping').classList.add('active');
        document.getElementById('chatbotSend').disabled = true;

        // Try Groq first, then Gemini
        callAI(text)
            .then(function(reply) {
                document.getElementById('chatbotTyping').classList.remove('active');
                appendMessage('bot', reply);
                chatHistory.push({ role: 'assistant', content: reply });
            })
            .catch(function(err) {
                document.getElementById('chatbotTyping').classList.remove('active');
                appendMessage('bot', 'Sorry, I couldn\'t get a response. Please make sure an AI API key (GROQ_API_KEY or GEMINI_API_KEY) is set in your .env file.');
            })
            .finally(function() {
                isSending = false;
                document.getElementById('chatbotSend').disabled = false;
            });
    };

    // ── AI Call (tries /api/groq/chat — no auth required) ─────
    function callAI(userMessage) {
        var messages = [
            { role: 'system', content: 'You are a helpful, friendly AI assistant for a school coding platform. Help students with homework, coding questions, and general learning. Keep responses concise and clear. Use markdown formatting for code snippets.' }
        ];
        // Include last 10 exchanges for context
        var recent = chatHistory.slice(-20);
        for (var i = 0; i < recent.length; i++) {
            messages.push({ role: recent[i].role, content: recent[i].content });
        }
        messages.push({ role: 'user', content: userMessage });

        // Try Groq (no auth required, free)
        return fetch('/api/groq/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ messages: messages, model: 'llama-3.3-70b-versatile', temperature: 0.7, max_tokens: 1024 })
        })
        .then(function(resp) {
            if (!resp.ok) throw new Error('Groq failed: ' + resp.status);
            return resp.json();
        })
        .then(function(data) {
            if (data.success && data.response) return data.response;
            // Groq original endpoint returns different format
            if (data.choices && data.choices[0]) return data.choices[0].message.content;
            throw new Error('No response from Groq');
        });
    }

    // ── Append Message ───────────────────────────────────────
    function appendMessage(role, text) {
        var msgs = document.getElementById('chatbotMessages');
        var div = document.createElement('div');
        div.className = 'chatbot-msg ' + role;

        var avatar = document.createElement('div');
        avatar.className = 'chatbot-msg-avatar';
        avatar.textContent = role === 'bot' ? '🤖' : '👤';

        var bubble = document.createElement('div');
        bubble.className = 'chatbot-msg-bubble';
        bubble.innerHTML = formatMarkdown(text);

        div.appendChild(avatar);
        div.appendChild(bubble);
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    // ── Simple Markdown Formatter ────────────────────────────
    function formatMarkdown(text) {
        // Escape HTML
        text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        // Code blocks
        text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
        // Inline code
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        // Bold
        text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        // Italic
        text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        // Line breaks to paragraphs
        text = text.replace(/\n\n/g, '</p><p>');
        text = text.replace(/\n/g, '<br>');
        text = '<p>' + text + '</p>';
        return text;
    }

    // ── Enter key ────────────────────────────────────────────
    document.getElementById('chatbotInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') chatbotSendMessage();
    });
})();
</script>
